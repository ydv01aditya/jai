<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Something I wanted to say</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #333;
    }

    .container {
      background: rgba(255, 255, 255, 0.9);
      padding: 40px;
      border-radius: 20px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease-in-out;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
    }

    button {
      margin-top: 20px;
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #ff6b81;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #ff4757;
      transform: scale(1.05);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Hey...</h1>
    <p>
      I know things haven’t been the same lately,  
      and I didn’t want to keep guessing what you feel.
    </p>

    <p>
      I just wanted to understand you better…  
      not force anything, not rush anything.
    </p>

    <p>
      So I made something small.  
      You can ignore it if you want… really.
    </p>

    <button onclick="goToForm()">If you feel like answering</button>
  </div>

  <script>
    function goToForm() {
      window.location.href = "https://forms.gle/8S9LaYpNvcrbqVWY6";
    }
  </script>

</body>
</html>
