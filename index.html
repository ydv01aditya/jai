<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Something I wanted to say</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #333;
      overflow: hidden;
    }

    /* 💖 FLOATING HEARTS */
    .hearts {
      position: fixed;
      width: 100%;
      height: 100%;
      overflow: hidden;
      z-index: 0;
    }

    .heart {
      position: absolute;
      bottom: -10px;
      color: rgba(255, 107, 129, 0.6);
      font-size: 20px;
      animation: floatUp 6s linear infinite;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh) scale(1.5);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.9);
      padding: 30px;
      border-radius: 20px;
      max-width: 500px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      animation: fadeIn 1.5s ease-in-out;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      font-size: 16px;
      line-height: 1.6;
    }

    /* 🔥 GLOW BUTTON */
    .glow-btn {
      margin-top: 25px;
      padding: 14px 30px;
      border: none;
      border-radius: 30px;
      background: linear-gradient(45deg, #ff6b81, #ff9a9e);
      color: white;
      font-size: 17px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px rgba(255, 107, 129, 0.6);
      animation: glowPulse 2s infinite;
    }

    .glow-btn:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px rgba(255, 107, 129, 1);
    }

    @keyframes glowPulse {
      0% { box-shadow: 0 0 8px rgba(255, 107, 129, 0.6); }
      50% { box-shadow: 0 0 25px rgba(255, 107, 129, 1); }
      100% { box-shadow: 0 0 8px rgba(255, 107, 129, 0.6); }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <!-- 💖 Hearts Container -->
  <div class="hearts"></div>

  <div class="container">
    <img src="image.png" alt="message">

    <h1>Hey...</h1>

    <p>
      I know things haven’t been the same lately,  
      and I didn’t want to keep guessing what you feel.
    </p>

    <p>
      I just wanted to understand you better…  
      not force anything, not rush anything.
    </p>

    <p>
      So I made something small.  
      You can ignore it if you want… really.
    </p>

    <button class="glow-btn" onclick="goToForm()">
      💖 If you feel like answering 💖
    </button>
  </div>

  <!-- 🎵 Background Music -->
  <audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <script>
    function goToForm() {
      window.location.href = "https://forms.gle/8S9LaYpNvcrbqVWY6";
    }

    // 💖 Generate floating hearts
    const heartsContainer = document.querySelector('.hearts');

    function createHeart() {
      const heart = document.createElement('div');
      heart.classList.add('heart');
      heart.innerHTML = '💖';

      heart.style.left = Math.random() * 100 + 'vw';
      heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
      heart.style.animationDuration = (Math.random() * 3 + 3) + 's';

      heartsContainer.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 6000);
    }

    setInterval(createHeart, 300);
  </script>

</body>
</html>
